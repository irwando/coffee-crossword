<P><A NAME="def_escape"></A><B>Escape Character</B></P>
<P>Backslash (<CODE>\</CODE>) must be used as the escape character when you
want the following <A HREF="def_metacharacter.htm">Metacharacter</A> to be
interpreted as the actual character, i.e. override its usual significance in
pattern matching.</P>
