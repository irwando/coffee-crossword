<P><A NAME="cm_tea_searchword"></A><B>Word Search Command</B></P>
<P>Use the Word Search command (which has <B>Ctrl+W</B> as a shortcut) to
change the <A HREF="def_search_mode.htm">Search Mode</A> to search for words
matching the pattern. The label on the search button changes to <B>Word
Search</B> to confirm the mode.</P>
