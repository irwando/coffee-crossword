<P><A NAME="cm_tea_file_demote"></A><B>File|Demote Command</B></P>
<P>Use the File|Demote command to lower the selected
<A HREF="def_dictionary.htm">Dictionary</A> in the search order, so it is
searched after the one previously below it in the <A HREF="window_main.htm">TEA
Main Window</A>.</P>
<P>This command appears on the <A HREF="menu_dictionary_context.htm">Dictionary
Context Menu</A> as well as the <A HREF="menu_file.htm">File Menu</A>.</P>
</BODY>
