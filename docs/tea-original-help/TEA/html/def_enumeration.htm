<P ALIGN="CENTER"><A NAME="def_enumeration"></A><B>Enumeration</B></P>
<P>The number(s) shown at the end of a <A HREF="def_clue.htm">Clue</A>. These
indicate the length of the answer, the number of
words and so on. For example, <B>Mason-Dixon Line</B> might have (5-5, 4) as
its enumeration.</P>
