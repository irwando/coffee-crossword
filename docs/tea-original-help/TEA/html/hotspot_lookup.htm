<P><A NAME="hotspot_lookup"></A><B>Definition Window Lookup Button</B></P>
<P>The <B>Lookup</B> button shows the <A
HREF="def_dictionary_definition.htm">Dictionary Definitions</A> of the selected
word in the Definition window. If there is no selection, the word nearest the
cursor is looked up. Note that double-clicking on a word will also look up its
definition and that can often be quicker.</P>
