<BODY BGCOLOR="#FFFFFF" TEXT="#000000">

<P><A NAME="cm_windowalwaysontop"></A><B>Window|Always On Top Command</B> </P>
<P>Use the Window|Always On Top command to make the TEA windows appear above
those for other Windows applications.</P>
<P>The command has a check mark when the TEA windows are already&quot;on
top&quot;. Use the command again to make the TEA windows behave as normal.</P>
