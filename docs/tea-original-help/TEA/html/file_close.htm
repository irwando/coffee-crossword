<P><A NAME="cm_tea_file_close"></A><B>File|Close Command</B></P>
<P>Use the File|Close command to remove the selected
<A HREF="def_dictionary.htm">Dictionary</A> in the <A
HREF="window_main.htm">TEA Main Window</A>.</P>
<P>This command appears on the <A HREF="menu_dictionary_context.htm">Dictionary
Context Menu</A> as well as the <A HREF="menu_file.htm">File Menu</A>.</P>
