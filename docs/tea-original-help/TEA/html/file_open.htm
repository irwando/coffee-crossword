<BODY BGCOLOR="#FFFFFF" TEXT="#000000">

<P><A NAME="cm_tea_file_open"></A><B>File|Open Command</B></P>
<P>Use the File|Open command to select one or more additional
<A HREF="def_dictionary.htm">Dictionaries</A> for searching. It pops up the
<A HREF="dlg_dictionary_file_selection.htm">Dictionary File Selection
Dialog</A>.</P>
<P>This command is not available if the maximum number of open dictionaries has
been reached.</P>
