<P><A NAME="hotspot_externallookup"></A><B>Definition Window External Lookup
Button</B></P>
<P>The <B>External Lookup</B> button searches for the selected word using
another Windows application (e.g. an Internet search engine or a supported
<A HREF="def_electronic.htm">Electronic Dictionary</A> application). If there
is no selection, the word nearest the cursor is searched for.</P>
