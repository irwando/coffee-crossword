<P><A NAME="hotspot_definition"></A><B>Definition Window Definition</B></P>
<P>Indented items with a page icon show the available
<A HREF="def_dictionary_definition.htm">Dictionary Definitions</A> for the word
being looked up. Click on them to see the corresponding definition. The item
label usually distinguishes the different definitions by their
<A HREF="def_part_of_speech.htm">Part of Speech</A> or a unique
<A HREF="def_sense_number.htm">Sense Number</A>.</P>
