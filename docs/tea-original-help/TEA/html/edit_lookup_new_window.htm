<BODY BGCOLOR="#FFFFFF" TEXT="#000000">

<P><A NAME="cm_tea_edit_link_new_window"></A><B>Edit|Lookup in New Window
Command</B></P>
<P>Use the Edit|Lookup in New Window command (which has <B>Shift+Ctrl+Enter</B>
as a shortcut) to view the <A HREF="def_dictionary_definition.htm">Dictionary
Definitions</A> for the selected word in a new <A
HREF="definition_window.htm">TEA Definition Window</A>.</P>
<P>Double-clicking on an entry with <B>Shift</B> held down is another shortcut
for this command.</P>
</BODY>
