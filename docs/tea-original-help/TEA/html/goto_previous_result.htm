<P><A NAME="cm_definition_previous_result"></A><B>Go To|Previous Result
Command</B></P>
<P>Use the Go To|Previous Result command (which has <B>Alt+Up Arrow</B> as a
shortcut) to select the result above the current one in the
<A HREF="window_main.htm">TEA Main Window</A> and show its
<A HREF="def_dictionary_definition.htm">Dictionary Definition</A>.</P>
