<BODY BGCOLOR="#FFFFFF" TEXT="#000000">

<P><A NAME="cm_tea_edit_cut"></A><B>Edit|Cut Command</B></P>
<P>Use the Edit|Cut command (which has <B>Ctrl+X</B> as a shortcut) to delete
selected text and copy it to the clipboard.</P>
<P>This command is only available when you are editing the <B>Pattern</B>.</P>
