<P><A NAME="cm_tea_edit_paste"></A><B>Edit|Paste Command</B></P>
<P>Use the Edit|Paste command (which has <B>Ctrl+V</B> as a shortcut) to insert
the text in the clipboard.</P>
<P>This command is only available when you are editing the <B>Pattern</B>.</P>
