<P><A NAME="def_tea"></A><B>TEA</B></P>
<P>TEA stands for The Electronic Alveary and is so-called because an alveary
was an early dictionary of English, French, Greek and Latin. The TEA icon is a
beehive, alluding to another meaning of alveary.</P>
