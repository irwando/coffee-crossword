<P><A NAME="cm_tea_searchfulltext"></A><B>Full Text Search Command</B></P>
<P>Use the Full Text Search command (which has <B>Ctrl+F</B> as a shortcut) to
change the <A HREF="def_search_mode.htm">Search Mode</A> to search for
definitions containing words matching the pattern. The label on the search
button changes to <B>Full Text Search</B> to confirm the mode.</P>
