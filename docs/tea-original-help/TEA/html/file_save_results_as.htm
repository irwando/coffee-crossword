<BODY BGCOLOR="#FFFFFF" TEXT="#000000">

<P><A NAME="cm_tea_file_save_as"></A><B>File|Save Results As Command</B></P>
<P>Use the File|Save Results As command to save the results of a
<A HREF="def_dictionary.htm">Dictionary</A> search as a text file or
<A HREF="def_tsdfile.htm">TEA&amp;Sympathy Dictionary File</A> using the
<A HREF="dlg_save_results.htm">Save Results Dialog</A>.</P>
<P>This command appears on the <A HREF="menu_dictionary_context.htm">Dictionary
Context Menu</A> as well as the <A HREF="menu_file.htm">File Menu</A>.</P>
</BODY>
