<P><A NAME="cm_tea_file_print_preview"></A><B>File|Print Preview Results
Command</B></P>
<P>Use the File|Print Preview Results command to view the printed results for a
<A HREF="def_dictionary.htm">Dictionary</A>. You do this in the
<A HREF="window_print_preview.htm">Print Preview Window</A>.</P>
<P>This command appears on the <A HREF="menu_result_context.htm">Result Context
Menu</A> as well as the <A HREF="menu_file.htm">File Menu</A>.</P>
