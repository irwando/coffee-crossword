<P><A NAME="def_anagram"></A><B>Anagram</B></P>
<P>An anagram is a rearrangement of the letters of a word or phrase; for
example, <B>orchestra</B> is an anagram of <B>cart-horse</B>. To search for
anagrams using a TEA pattern, type in the letters after a semicolon
(<CODE>;</CODE>).</P>
